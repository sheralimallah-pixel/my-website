<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - SKR INTERNATIONAL</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d6efd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#fff;
padding:30px;
width:350px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#0d6efd;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#084298;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#0d6efd;
text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyARX24b0EnCmh-3WcYfy9wtgj5vpHUNEPQ",
  authDomain: "sherry-project-1214.firebaseapp.com",
  projectId: "sherry-project-1214",
  storageBucket: "sherry-project-1214.firebasestorage.app",
  messagingSenderId: "692003406873",
  appId: "1:692003406873:web:1addf2cb2437cfe1761688",
  measurementId: "G-QYE7Y2DKHT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", ()=>{

const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;

if(email==="" || password===""){
alert("Please enter email and password.");
return;
}

signInWithEmailAndPassword(auth,email,password)

.then(()=>{
alert("Login Successful!");
window.location.href="dashboard.html";
})

.catch((error)=>{
alert(error.message);
});

});

</script>

</body>
</html>
