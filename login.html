<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Sherry Website</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0d6efd;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:#fff;
    padding:30px;
    width:320px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#0d6efd;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
}

p{
    text-align:center;
}

a{
    color:#0d6efd;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="login-box">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<p>Don't have an account? <a href="register.html">Register</a></p>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyARX24b0EnCmh-3WcYfy9wtgj5vpHUNEPQ",
  authDomain: "sherry-project-1214.firebaseapp.com",
  projectId: "sherry-project-1214",
  storageBucket: "sherry-project-1214.firebasestorage.app",
  messagingSenderId: "692003406873",
  appId: "1:692003406873:web:1addf2cb2437cfe1761688",
  measurementId: "G-QYE7Y2DKHT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("loginBtn").addEventListener("click", () => {

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

signInWithEmailAndPassword(auth, email, password)

.then(() => {
    alert("Login Successful!");
    window.location.href = "dashboard.html";
})

.catch((error) => {
    alert(error.message);
});

});

</script>
</body>
</html>
