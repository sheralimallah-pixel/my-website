
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Sherry Website</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0d6efd;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.register-box{
    background:#fff;
    padding:30px;
    width:320px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}
h2{
    text-align:center;
    color:#0d6efd;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}
p{
    text-align:center;
}
a{
    color:#0d6efd;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="register-box">
<h2>Create Account</h2>

<input type="text" id="name" placeholder="Full Name">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button id="registerBtn">Register</button>

<p>Already have an account?
<a href="login.html">Login</a></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "sherry-project-1214.firebaseapp.com",
  projectId: "sherry-project-1214",
  storageBucket: "sherry-project-1214.firebasestorage.app",
  messagingSenderId: "692003406873",
  appId: "1:692003406873:web:e38c4b3806d963b5761688"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("registerBtn").addEventListener("click", () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)
.then(() => {
alert("Account Created Successfully!");
window.location.href="login.html";
})
.catch((error)=>{
alert(error.message);
});

});
</script>

</body>
</html>
