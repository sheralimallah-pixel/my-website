<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register - SKR INTERNATIONAL</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d6efd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.register-box{
background:#fff;
width:350px;
padding:30px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#0d6efd;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#084298;
}

p{
text-align:center;
margin-top:15px;
}

a{
color:#0d6efd;
text-decoration:none;
}

</style>

</head>

<body>

<div class="register-box">

<h2>Create Account</h2>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="registerBtn">
Register
</button>

<p>

Already have an account?

<a href="login.html">
Login
</a>

</p>

</div>
