<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw - SKR INTERNATIONAL</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d6efd;
}

.container{
max-width:400px;
margin:40px auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#0d6efd;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#0d6efd;
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#084298;
}
</style>
</head>

<body>

<div class="container">

<h2>Withdraw Request</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<select id="method">
<option>JazzCash</option>
<option>EasyPaisa</option>
<option>Bank Account</option>
</select>

<input type="text" id="account" placeholder="Account Number">

<button id="withdrawBtn">Submit Withdraw</button>

<button onclick="window.location.href='dashboard.html'">
Back to Dashboard
</button>

</div>

<script>

document.getElementById("withdrawBtn").onclick=function(){

const amount=document.getElementById("amount").value;
const method=document.getElementById("method").value;
const account=document.getElementById("account").value;

if(amount=="" || account==""){
alert("Please fill all fields");
return;
}

alert(
"Withdraw Request Submitted\n\n"+
"Amount: "+amount+
"\nMethod: "+method+
"\nAccount: "+account
);

}

</script>

</body>
</html>
