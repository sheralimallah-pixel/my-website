<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0d6efd;
}

.header{
background:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
color:#0d6efd;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px;
background:#0d6efd;
color:white;
cursor:pointer;
}

button:hover{
background:#084298;
}
</style>
</head>

<body>

<div class="header">
SKR INTERNATIONAL
</div>

<div class="container">

<div class="card">
<h2>Welcome</h2>
<p id="email"></p>
</div>

<div class="card">
<button onclick="alert('Deposit Page Coming Soon')">Deposit</button>

<button onclick="alert('Withdraw Page Coming Soon')">Withdraw</button>

<button id="logoutBtn">Logout</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
import { getAuth,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyARX24b0EnCmh-3WcYfy9wtgj5vpHUNEPQ",
  authDomain: "sherry-project-1214.firebaseapp.com",
  projectId: "sherry-project-1214",
  storageBucket: "sherry-project-1214.firebasestorage.app",
  messagingSenderId: "692003406873",
  appId: "1:692003406873:web:1addf2cb2437cfe1761688",
  measurementId: "G-QYE7Y2DKHT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth,(user)=>{

if(user){
document.getElementById("email").innerHTML="Logged in as: "+user.email;
}else{
window.location.href="login.html";
}

});

document.getElementById("logoutBtn").addEventListener("click",()=>{

signOut(auth).then(()=>{
alert("Logged Out");
window.location.href="login.html";
});

});

</script>
onclick="alert('Deposit Page Coming Soon')"
</body>
</html>
